services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ./run-api.sh
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mongo
      - valkey
    volumes:
      - uploads_data:/mnt/uploads
      - ./app:/app/app

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ./run-worker.sh
    env_file:
      - .env
    depends_on:
      - mongo
      - valkey
    volumes:
      - uploads_data:/mnt/uploads
      - ./app:/app/app

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  valkey:
    image: valkey/valkey:8
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data

volumes:
  mongo_data:
  valkey_data:
  uploads_data:
